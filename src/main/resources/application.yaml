spring:
  application:
    name: mini-marketplace
  
  # Default profile for local development with Docker
  profiles:
    active: local
  
  # PostgreSQL Database Configuration (Docker default)
  datasource:
    url: jdbc:postgresql://localhost:5433/mini_marketplace
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update  # Options: create, create-drop, update, validate, none
    show-sql: true  # Show SQL queries in console
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true  # Format SQL for readability

# JWT Configuration
jwt:
  secret: mySecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256AlgorithmMinimum256Bits
  expiration: 86400000  # 24 hours in milliseconds (1000 * 60 * 60 * 24)
  
# Server Configuration
server:
  port: 8083
  error:
    include-message: always
    include-binding-errors: always

---
# Legacy profile for original teammate setup
