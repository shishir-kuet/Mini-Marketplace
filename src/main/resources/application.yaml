spring:
  application:
    name: mini-marketplace
  
  # PostgreSQL Database Configuration
  # Override with env vars: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/mini_marketplace}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:false}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false

# JWT Configuration
# Override with env var: JWT_SECRET
jwt:
  secret: ${JWT_SECRET:mySecretKeyForJWTTokenGenerationMustBeLongEnoughForHS256AlgorithmMinimum256Bits}
  expiration: 86400000  # 24 hours in milliseconds
  
# Server Configuration
# Render injects PORT env var automatically
server:
  port: ${PORT:8083}
  error:
    include-message: always
    include-binding-errors: always

