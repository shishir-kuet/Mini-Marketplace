spring:
  application:
    name: mini-marketplace
  
  # Default configuration (Docker environment)
  datasource:
    url: jdbc:postgresql://postgres:5432/mini_marketplace
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  
  # JPA/Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

# JWT Configuration
# Set JWT_SECRET env var on your deployment platform (Render → Environment → Add Secret File)
jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours default

# Server Configuration
server:
  port: ${PORT:8083}
  error:
    include-message: never      # Never leak internal messages in production
    include-binding-errors: never

---
# Local development profile
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:postgresql://localhost:5432/mini_marketplace
    username: postgres
    password: postgres

